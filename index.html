<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Manager App</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>₹ Money Manager</h1>
    <div>
      <button id="exportCsvBtn" style="background-color: #2a1a45; color: #D6B9FC; margin-right: 10px;">Export CSV</button>
      <button id="openFormBtn">+ Add Transaction</button>
    </div>
  </header>

  <main>

    <div class="summary">
      <div class="card" id="cardIncome">
        <p>Total Income</p>
        <h3 id="totalIncome">₹ 0.00</h3>
      </div>
      <div class="card" id="cardExpense">
        <p>Total Expenses</p>
        <h3 id="totalExpense">₹ 0.00</h3>
      </div>
      <div class="card" id="cardBalance">
        <p>Net Balance</p>
        <h3 id="netBalance">₹ 0.00</h3>
      </div>
    </div>

    <div class="chart-container" style="display: none;">
      <canvas id="expenseChart"></canvas>
    </div>

    <div class="filters">
      <div class="filter-item">
        <label for="filterCategory">Category</label>
        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="Income">Income</option>
          <option value="Expense">Expense</option>
        </select>
      </div>

      <div class="filter-item">
        <label for="filterSubCategory">Sub-Category</label>
        <select id="filterSubCategory">
          <option value="">All Sub-Categories</option>
        </select>
      </div>

      <div class="filter-item">
        <label for="filterDateFrom">From</label>
        <input type="date" id="filterDateFrom">
      </div>

      <div class="filter-item">
        <label for="filterDateTo">To</label>
        <input type="date" id="filterDateTo">
      </div>

      <div class="filter-item">
        <label for="sortBy">Sort By</label>
        <select id="sortBy">
          <option value="">Default</option>
          <option value="date-newest">Date: Newest First</option>
          <option value="date-oldest">Date: Oldest First</option>
          <option value="amount-high">Amount: High to Low</option>
          <option value="amount-low">Amount: Low to High</option>
        </select>
      </div>

      <div class="filter-item">
        <label>&nbsp</label>
        <button id="clearFiltersBtn">Clear</button>
      </div>
    </div>

    <div class="table-section">
      <h2>Transaction History</h2>
      <div class="table-wrapper">
        <table id="transactionTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Sub-Category</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="transactionTableBody">
            </tbody>
        </table>
      </div>
      <p id="emptyState">No transactions yet. Add one to get started!</p>
    </div>

  </main>

  <div class="overlay hidden" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-top">
        <h2 id="modalTitle">Add Transaction</h2>
        <button id="closeFormBtn" aria-label="Close form">X</button>
      </div>

      <form id="transactionForm">
        <div class="form-group">
          <label for="amount">Amount *</label>
          <input type="number" id="amount" placeholder="Enter amount" aria-describedby="amountError">
          <span class="err" id="amountError" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="date">Date *</label>
          <input type="date" id="date" aria-describedby="dateError">
          <span class="err" id="dateError" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label id="categoryLabel">Category *</label>
          <div class="radio-group" role="group" aria-labelledby="categoryLabel">
            <label><input type="radio" name="category" value="Income"> Income</label>
            <label><input type="radio" name="category" value="Expense"> Expense</label>
          </div>
          <span class="err" id="categoryError" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="subCategory">Sub-Category *</label>
          <select id="subCategory" aria-describedby="subCategoryError">
            <option value="">-- select category first --</option>
          </select>
          <span class="err" id="subCategoryError" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="description">Description (optional)</label>
          <input type="text" id="description" placeholder="max 100 characters" maxlength="100">
        </div>

        <input type="hidden" id="editId" aria-hidden="true">

        <div class="form-btns">
          <button type="button" id="cancelFormBtn">Cancel</button>
          <button type="submit" id="submitFormBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="overlay hidden" id="deleteOverlay">
    <div class="modal small-modal" role="alertdialog" aria-modal="true" aria-labelledby="deleteTitle" aria-describedby="deleteDesc">
      <h2 id="deleteTitle">Are you sure?</h2>
      <p id="deleteDesc">This will permanently delete the transaction.</p>
      <div class="form-btns">
        <button id="cancelDeleteBtn">Cancel</button>
        <button id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>

</body>
</html>
